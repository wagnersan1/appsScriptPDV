<!--
    =======================================================================================
    ARQUIVO DO SISTEMA: estilo.html
    DESCRIÇÃO: Folha de Estilos Globais (CSS).
    Centraliza propriedades visuais, responsividade e classes universais (como botões e formulários)
    mantendo a consistência do design da agência em todas as abas.
    =======================================================================================
-->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    /* =========================================================
       EL ROPERO (Estilos Generales)
       Todo esto le da los colores, tamaños de letra y redondeos a las cajitas de toda la web.
       ========================================================= */
    body {
        font-family: 'Inter', Arial, sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
        margin: 0;
    }

    .header {
        background: rgba(44, 62, 80, 0.9);
        backdrop-filter: blur(10px);
        color: white;
        padding: 20px 25px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .container {
        padding: 30px;
        max-width: 1200px;
        margin: 0 auto;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 25px;
    }

    .card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 16px;
        padding: 35px 20px;
        text-align: center;
        font-size: 36px;
        color: #475569;
        cursor: pointer;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .card:hover {
        transform: translateY(-8px) scale(1.03);
        background: #ffffff;
        color: #3b82f6;
        box-shadow: 0 20px 30px rgba(59, 130, 246, 0.15);
    }

    .card h3 {
        font-size: 16px;
        font-weight: 600;
        margin-top: 20px;
        color: #334155;
    }

    /* CSS DO SPINNER DE LOADING */
    .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, .3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s ease-in-out infinite;
        vertical-align: middle;
        margin-right: 8px;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    button:disabled {
        background: #95a5a6;
        cursor: not-allowed;
    }

    /* ================================= */
    /* VENDAS & FORMULÁRIOS              */
    /* ================================= */
    .form-box {
        max-width: 600px;
        margin: auto;
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        margin-top: 20px;
        margin-bottom: 20px;
    }

    .form-box label {
        font-weight: bold;
        display: block;
        margin-top: 10px;
        color: #2c3e50;
    }

    .form-box input,
    .form-box select,
    .form-box button {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    .form-box button {
        background-color: #2c3e50;
        color: white;
        border: none;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 15px;
    }

    .form-box button:hover:not(:disabled) {
        background-color: #34495e;
    }

    .autocomplete-list {
        background: white;
        border: 1px solid #ccc;
        max-height: 150px;
        overflow: auto;
        display: none;
        border-radius: 0 0 5px 5px;
    }

    .autocomplete-list div {
        padding: 8px;
        cursor: pointer;
        border-bottom: 1px solid #f0f0f0;
    }

    .autocomplete-list div:hover {
        background: #f0f0f0;
    }

    .admin-panel {
        display: none;
        background: #e8f4f8;
        padding: 15px;
        margin-top: 15px;
        border-radius: 8px;
        border-left: 5px solid #3498db;
    }

    .result-view {
        margin-top: 15px;
        font-size: 18px;
        font-weight: bold;
    }
</style>
