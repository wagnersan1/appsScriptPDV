<!--
    =======================================================================================
    ARQUIVO DO SISTEMA: index.html
    DESCRIÇÃO: Dashboard Principal (Home).
    Ponto de entrada do sistema após o login. Apresenta os atalhos para os módulos (Ventas, Clientes, Caja, etc.)
    e também um resumo rápido das vendas do dia/mês extraído da planilha através da função getDashboardData().
    =======================================================================================
-->
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>SISTEMA PDV TURISMO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <?!= include('style') ?>

    <?!= include('script') ?>

    <script>
        // 1. VERIFICACIÓN DE LOGIN (DEBE IR PRIMERO)
        verificarLogin();

        function verificarLogin() {
            // 1. Obtenemos la URL del servicio (ej: /gs/exec)
            var BASE_URL = "<?!= ScriptApp.getService().getUrl() ?>";

            // 2. Obtenemos el objeto 'user' que guardamos en el navegador la última vez.
            var user = JSON.parse(localStorage.getItem("user"));

            // 3. Verificación: Si NO hay usuario, lo mandamos de vuelta al login.
            if (!user) {
                window.top.location.href = BASE_URL + "?page=login";
                return; // Detiene la ejecución aquí
            }

            // 4. Si hay usuario, mostramos su nombre en la barra superior.
            if (user.nome) {
                document.getElementById("userNome").innerHTML = user.nome;
            }

            // 5. Llamamos a la función del servidor para pedir los números (Ventas, Caja, etc.)
            cargarDashboard();
        }       
    </script>


    <style>
        /* =========================================================
           SECCIÓN DE ESTILOS VISUALES (CSS interno)
           Define cómo se ven los botones, tarjetas y menúes de esta pantalla.
           ========================================================= */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card-info {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .card-info h3 {
            margin: 0;
            font-size: 16px;
            color: #555;
        }

        .card-info .value {
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
        }

        .logout {
            cursor: pointer;
            color: #e74c3c;
            font-size: 14px;
            font-weight: bold;
        }

        .header {
            background: rgba(44, 62, 80, 0.9);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            color: white;
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <!-- =========================================================
         HEADER (Barra superior)
         Muestra el nombre del sistema y el botón de cerrar sesión.
         ========================================================= -->
    <div class="header">
        <h2><i class="fa-solid fa-globe"></i> SISTEMA PDV TURISMO</h2>
        <div class="user">
            <i class="fa-regular fa-user"></i> <span id="userNome">Cargando...</span> |
            <span class="logout" onclick="logout()">Sair</span>
        </div>
    </div>

    <div class="container">
        <!-- =========================================================
             TABLERO (Dashboard Info)
             Tarjetas que muestran las ventas del día, mes y la caja. 
             Los montos (...) son rellenados automáticamente con JavaScript.
             ========================================================= -->
        <div class="dashboard">
            <div class="card-info">
                <h3>Ventas Hoy</h3>
                <div class="value" style="color: #27ae60;" id="ventasHoy">...</div>
            </div>
            <div class="card-info">
                <h3>Ventas Mes</h3>
                <div class="value" style="color: #2980b9;" id="ventasMes">...</div>
            </div>
            <div class="card-info">
                <h3>Lucro Total</h3>
                <div class="value" style="color: #8e44ad;" id="lucroTotal">...</div>
            </div>
            <div class="card-info">
                <h3>Caja ARS</h3>
                <div class="value" id="cajaARS">...</div>
            </div>
            <div class="card-info">
                <h3>Caja USD</h3>
                <div class="value" id="cajaUSD">...</div>
            </div>
            <div class="card-info">
                <h3>Caja BRL</h3>
                <div class="value" id="cajaBRL">...</div>
            </div>
        </div>

        <!-- =========================================================
             MENÚ PRINCIPAL (Botones de Navegación)
             Al hacer clic en un botón, se ejecuta "abrir('nombre_pagina')".
             Esa función carga el HTML correspondiente en la pantalla.
             ========================================================= -->
        <div class="grid">
            <div class="card" onclick="abrir('servicos')"><i class="fa-solid fa-wrench"></i>
                <h3>Serviços</h3>
            </div>
            <div class="card" onclick="abrir('fornecedores')"><i class="fa-solid fa-handshake"></i>
                <h3>Fornecedores</h3>
            </div>
            <div class="card" onclick="abrir('funcionarios')"><i class="fa-solid fa-user-tie"></i>
                <h3>Funcionarios</h3>
            </div>
            <div class="card" onclick="abrir('ventas')"><i class="fa-solid fa-cart-shopping"></i>
                <h3>Ventas</h3>
            </div>
            <div class="card" onclick="abrir('caja')"><i class="fa-solid fa-cash-register"></i>
                <h3>Caja</h3>
            </div>
            <div class="card" onclick="abrir('clientes')"><i class="fa-solid fa-users"></i>
                <h3>Clientes</h3>
            </div>
            <div class="card" onclick="abrirReportes()"><i class="fa-solid fa-chart-line"></i>
                <h3>Reportes</h3>
            </div>
            <div class="card" onclick="abrir('dashboardEmpresa')"><i class="fa-solid fa-building"></i>
                <h3>Empresa</h3>
            </div>
            <div class="card" onclick="abrir('painel')"><i class="fa-solid fa-chart-pie"></i>
                <h3>Avançado</h3>
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // LÓGICA DE DIBUJADO DE LA PANTALLA
        // =========================================================

        // 1. Mostrar nombre de usuario que trajimos del LocalStorage.
        if (user && user.nome) {
            document.getElementById("userNome").innerHTML = user.nome;
        }

        // 2. Función que va a pedirle a Google Sheets los números de Ventas y Caja.
        function cargarDashboard() {
            // google.script.run es la "llamada telefónica" al archivo código.gs del Backend.
            google.script.run
                .withSuccessHandler(function (data) {
                    if (data) {
                        document.getElementById("ventasHoy").innerHTML = (data.totalHoy || 0).toFixed(2) + " ARS";
                        document.getElementById("ventasMes").innerHTML = (data.totalMes || 0).toFixed(2) + " ARS";
                        document.getElementById("lucroTotal").innerHTML = (data.lucroTotal || 0).toFixed(2) + " ARS";
                        document.getElementById("cajaARS").innerHTML = (data.cajaARS || 0).toFixed(2);
                        document.getElementById("cajaUSD").innerHTML = (data.cajaUSD || 0).toFixed(2);
                        document.getElementById("cajaBRL").innerHTML = (data.cajaBRL || 0).toFixed(2);
                    }
                })
                .getDashboardData()
        }

        // Iniciar carga de datos   
        cargarDashboard();

        // =========================================================
        // CONTROLE DE ACESSO: REPORTES
        // =========================================================
        // Só ADMIN, GERENTE e CEO podem ver o Histórico de Vendas.
        function abrirReportes() {
            var u = JSON.parse(localStorage.getItem("user") || "null");
            if (!u) { abrir('login'); return; }
            var rolesPermitidos = ["ADMIN", "GERENTE", "CEO"];
            if (rolesPermitidos.indexOf((u.funcao || "").toUpperCase()) === -1) {
                alert("⛔ Acesso Negado\n\nApenas ADMIN, GERENTE e CEO podem acessar os Reportes.");
                return;
            }
            abrir('listaVentas');
        }
    </script>
</body>

</html>
