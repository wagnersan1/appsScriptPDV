<!--
    =======================================================================================
    ARCHIVO: login.html
    DESCRIPCIÓN: Pantalla inicial del sistema. 
    Contiene un formulario simple pidiendo Usuario y Contraseña. Se comunica con `código.gs`
    para verificar si las credenciales son correctas antes de dejar entrar al usuario.
    =======================================================================================
-->
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Travel Santur PDV</title>

    <!-- Puxando a fonte padrão modernizada do seu sistema -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* Carousel Background */
        .bg-carousel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: #000;
        }
        .bg-carousel video, .bg-carousel img {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        .bg-carousel .active {
            opacity: 1;
        }

        /* Overlay escuro para dar contraste ao login */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 100%;
            max-width: 320px;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .login-box h2 {
            margin-top: 0;
            color: #2c3e50;
            font-weight: 800;
            font-size: 26px;
            letter-spacing: 1px;
        }

        .login-box p {
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .login-box input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #bdc3c7;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            transition: 0.3s;
            background: #f9f9f9;
        }

        .login-box input:focus {
            border-color: #2980b9;
            background: white;
            outline: none;
            box-shadow: 0 0 8px rgba(41, 128, 185, 0.4);
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3);
        }

        .login-box button:hover {
            background: #2ecc71;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(39, 174, 96, 0.4);
        }

        .error-msg {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 10px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <!-- =========================================================
         CARROSSEL DE FUNDO
         ========================================================= -->
    <div class="bg-carousel" id="bgCarousel"></div>
    <div class="bg-overlay"></div>

    <!-- =========================================================
         CAJA CENTRAL DE LOGIN
         Aquí dibujamos el logo, el título y los campos para escribir.
         ========================================================= -->
    <div class="login-box">
        <!-- Logo ajustado para src direto do Google Drive -->
        <img src="https://drive.google.com/uc?id=1GrdR032gawN1VoflfYFzY3panwHfvR88"
            alt="Travel Santur Logo" style="width: 150px; margin-bottom: 15px; border-radius: 10px; object-fit: contain;">
        <h2>Travel Santur</h2>
        <p>Painel de Controle e Vendas</p>

        <input type="text" id="user" placeholder="Nome de Usuário" autocomplete="off" onkeydown="verificarEnter(event)">
        <input type="password" id="password" placeholder="Senha" autocomplete="off" onkeydown="verificarEnter(event)">

        <div class="error-msg" id="msgErro">Usuário ou senha incorretos.</div>

        <button id="btnEntrar" onclick="entrar()">ENTRAR AQUI</button>
    </div>

    <script>
        // =========================================================
        // CAROUSEL BACKGROUND LOGIC
        // =========================================================
        const mediaItems = [
            // Vídeos do seu Google Drive convertidos para links de download direto para reprodução:
            { type: 'video', url: 'https://drive.google.com/uc?export=download&id=1Mfvno1WMXRXnEZceLmT244mkSS9hEwSd' },
            { type: 'video', url: 'https://drive.google.com/uc?export=download&id=1rzZwm2Tg5EpH7lekj3CkIhtjmNw7er9w' },
            { type: 'video', url: 'https://drive.google.com/uc?export=download&id=10I6Bn66adeMHXABGoZ-PJg0UbHwQWuG6' },
            { type: 'video', url: 'https://drive.google.com/uc?export=download&id=1kSgt75C38l4I-dXfVV5gHtpe9vA1G7HV' }
        ];

        let currentMediaIndex = 0;
        let bgCarousel;

        function initCarousel() {
            bgCarousel = document.getElementById('bgCarousel');
            if (mediaItems.length === 0) return;

            mediaItems.forEach((media, index) => {
                let el;
                if (media.type === 'video') {
                    el = document.createElement('video');
                    el.src = media.url;
                    el.muted = true;
                    el.loop = false;
                    el.playsInline = true;
                    // Avança pro próximo quando o vídeo terminar
                    el.onended = nextMedia;
                } else {
                    el = document.createElement('img');
                    el.src = media.url;
                }
                if (index === 0) el.classList.add('active');
                bgCarousel.appendChild(el);
            });
            
            // Inicia o vídeo se o primeiro for vídeo
            let firstEl = bgCarousel.children[0];
            if (firstEl.tagName === 'VIDEO') {
                firstEl.play().catch(e => console.log('Autoplay prevenido:', e));
            }

            // Configura o timer pro carrossel apenas se a primeira for imagem
            if (firstEl.tagName === 'IMG') {
                setTimeout(nextMedia, 5000); // 5 segundos para imagens
            }
        }

        function nextMedia() {
            if (mediaItems.length <= 1) return;
            
            let els = bgCarousel.children;
            els[currentMediaIndex].classList.remove('active');
            if (els[currentMediaIndex].tagName === 'VIDEO') {
                els[currentMediaIndex].pause();
                els[currentMediaIndex].currentTime = 0;
            }

            currentMediaIndex = (currentMediaIndex + 1) % mediaItems.length;

            els[currentMediaIndex].classList.add('active');
            if (els[currentMediaIndex].tagName === 'VIDEO') {
                els[currentMediaIndex].play().catch(e => console.log('Play prevenido:', e));
            } else {
                setTimeout(nextMedia, 5000);
            }
        }

        window.addEventListener('DOMContentLoaded', initCarousel);

        // =========================================================
        // LÓGICA DE VALIDACIÓN Y ACCESO (JavaScript Frontend)
        // =========================================================

        // Pega a URL do diretório do Google dinamicamente para navegação contínua
        var BASE_URL = "<?!= ScriptApp.getService().getUrl() ?>";

        function verificarEnter(e) {
            // Permite presionar la tecla 'Enter' para iniciar sesión sin hacer clic al botón.
            if (e.key === "Enter") {
                entrar();
            }
        }

        // Función principal que se dispara al hacer clic en "ENTRAR AQUI".
        function entrar() {
            var u = document.getElementById("user").value.trim();
            var p = document.getElementById("password").value.trim();
            var btn = document.getElementById("btnEntrar");
            var msg = document.getElementById("msgErro");

            // Validar que no manden campos vacíos
            if (u === "" || p === "") {
                msg.innerText = "Preencha todos os campos.";
                msg.style.display = "block";
                return;
            }

            // Cambiamos el texto del botón mientras esperamos (UX).
            btn.disabled = true;
            btn.innerHTML = "Verificando...";
            btn.style.background = "#95a5a6";
            msg.style.display = "none";

            // Envia para o Backend (código.gs -> function login)
            // Aquí le pasamos el usuario (u) y la contraseña (p) al servidor.
            google.script.run
                .withSuccessHandler(function (res) {
                    if (res.success) {
                        btn.innerHTML = "Redirecionando...";
                        btn.style.background = "#2980b9";
                        // Grava os dados da Sessão no Cache Local
                        localStorage.setItem("user", JSON.stringify(res));
                        // Redireciona para o Menu Principal
                        window.top.location.href = BASE_URL + "?page=index.html";
                    } else {
                        btn.disabled = false;
                        btn.innerHTML = "ENTRAR AQUI";
                        btn.style.background = "#27ae60";
                        msg.innerText = "Usuário, senha incorretos ou inativo.";
                        msg.style.display = "block";
                    }
                })
                .withFailureHandler(function (err) {
                    btn.disabled = false;
                    btn.innerHTML = "ENTRAR AQUI";
                    btn.style.background = "#27ae60";
                    msg.innerText = "Erro ao conectar com o banco de dados.";
                    msg.style.display = "block";
                })
                .login(u, p);
        }
    </script>
</body>

</html>
